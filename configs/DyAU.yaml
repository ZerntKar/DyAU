model:
  audio_dim: 80
  motion_dim: 128
  hidden_dim: 256
  interaction_dim: 256
  lip_dim: 64
  exp_dim: 64
  state_dim: 64
  affect_dim: 64
  au_dim: 32
  region_control_dim: 32
  n_queries: 8
  n_heads: 4
  audio_layers: 0
  motion_layers: 2
  interaction_layers: 4
  decoder_layers: 4
  dropout: 0.1
  pseudo_au_regions: [mouth_jaw, brow_eye, cheek, head_neck]
  # Replace these slices with your real 3DMM/FLAME/blendshape index groups.
  region_slices:
    mouth_jaw: [0, 32]
    brow_eye: [32, 64]
    cheek: [64, 96]
    head_neck: [96, 128]

data:
  train_manifest: ""
  val_manifest: ""
  test_manifest: ""
  batch_size: 16
  num_workers: 0
  max_frames: 120
  derive_missing_pseudo_au: true

optim:
  lr: 0.0001
  weight_decay: 0.0001
  epochs: 100
  warmup_epochs: 5
  grad_clip: 1.0
  log_every: 20
  save_every: 1

runtime:
  device: auto
  seed: 42
  output_dir: runs/DyAU

loss:
  rec: 1.0
  au: 0.2
  reg: 0.5
  dyn: 0.1
  second_order_mu: 0.5

region_weights:
  mouth_jaw: 1.4
  brow_eye: 1.2
  cheek: 1.0
  head_neck: 1.1
