model:
  audio_dim: 16
  motion_dim: 32
  hidden_dim: 64
  interaction_dim: 64
  lip_dim: 16
  exp_dim: 16
  state_dim: 16
  affect_dim: 16
  au_dim: 32
  region_control_dim: 8
  n_queries: 4
  n_heads: 4
  audio_layers: 0
  motion_layers: 1
  interaction_layers: 1
  decoder_layers: 1
  dropout: 0.1
  pseudo_au_regions: [mouth_jaw, brow_eye, cheek, head_neck]
  region_slices:
    mouth_jaw: [0, 8]
    brow_eye: [8, 16]
    cheek: [16, 24]
    head_neck: [24, 32]

data:
  train_manifest: toy_data/train.txt
  val_manifest: toy_data/val.txt
  test_manifest: toy_data/test.txt
  batch_size: 2
  num_workers: 0
  max_frames: 120
  derive_missing_pseudo_au: true

optim:
  lr: 0.0003
  weight_decay: 0.0001
  epochs: 2
  warmup_epochs: 1
  grad_clip: 1.0
  log_every: 2
  save_every: 1

runtime:
  device: cpu
  seed: 42
  output_dir: runs/DyAU_toy

loss:
  rec: 1.07
  str: 0.47
  au: 0.23
  reg: 0.56
  dyn: 0.13
  second_order_mu: 0.46

region_weights:
  mouth_jaw: 1.43
  brow_eye: 1.17
  cheek: 0.96
  head_neck: 1.08
